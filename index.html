<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#b45309">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EnergyHub">
<meta name="description" content="Bourses, stages et fellowships en énergie renouvelable et climat — Bénin, Afrique, International">
<link rel="manifest" href="./manifest.json">
<title>EnergyHub ⚡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0c12;color:#e2e8f0;font-family:'Segoe UI',Tahoma,sans-serif;overscroll-behavior:none}
:root{
  --gold:#c0a060;--amber:#b45309;--amber2:#d97706;
  --bg:#0a0c12;--card:#12151e;--card2:#1a1d26;
  --border:#2a2d3a;--muted:#475569;--sub:#334155;
}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}

/* ── HEADER ── */
.header{background:linear-gradient(180deg,#0f1117,#0a0c12);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,12px) 16px 0;position:sticky;top:0;z-index:50}
.header-top{display:flex;justify-content:space-between;align-items:center;padding:12px 0 10px}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#b45309,#d97706);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-name{color:var(--gold);font-weight:800;font-size:17px;letter-spacing:.06em}
.logo-badge{background:#1a2030;color:#60a5fa;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.1em}
.new-badge{background:linear-gradient(90deg,#1d4ed8,#3b82f6);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px}

.header-btns{display:flex;gap:8px;align-items:center}
.btn-refresh{background:#12151e;border:1px solid var(--border);color:#60a5fa;font-weight:700;padding:7px 12px;border-radius:10px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px}
.btn-add{background:linear-gradient(135deg,#b45309,#d97706);color:#fff;font-weight:700;padding:7px 12px;border-radius:10px;border:none;cursor:pointer;font-size:12px}

/* ── SEARCH ── */
.search-box{display:flex;gap:8px;background:#12151e;border:1px solid var(--border);border-radius:12px;padding:8px 8px 8px 12px;margin:0 0 10px}
.search-box input{flex:1;background:transparent;border:none;color:#e2e8f0;font-size:13px;outline:none}
.search-box input::placeholder{color:var(--muted)}
.btn-search{background:linear-gradient(135deg,#b45309,#d97706);color:#fff;font-weight:700;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:12px;white-space:nowrap}
.ai-result{background:#12151e;border:1px solid #b4530944;border-radius:10px;padding:10px 12px;display:flex;gap:8px;margin-bottom:10px}
.ai-result p{color:var(--gold);font-size:12px;line-height:1.6}

/* ── REGION TABS ── */
.region-tabs{display:flex;border-bottom:1px solid var(--border);margin:0 -16px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.region-tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;color:var(--muted);border:none;border-bottom:2px solid transparent;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.active{color:var(--gold);border-bottom-color:var(--amber)}
.tab-count{margin-left:5px;background:#1a1d26;color:var(--sub);font-size:10px;padding:1px 6px;border-radius:10px}
.tab.active .tab-count{color:var(--gold)}

/* ── TYPE FILTERS ── */
.filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:10px 0 4px}
.filters::-webkit-scrollbar{display:none}
.filter-btn{background:#12151e;color:var(--muted);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.filter-btn.active{background:linear-gradient(135deg,#b45309,#d97706);color:#fff;border-color:transparent}
.filter-btn.funded-btn.active{background:#451a0344;color:#fbbf24;border-color:#b4530966}

/* ── STATS ── */
.stats{display:flex;gap:10px;padding:8px 12px;background:#0f1117;border-radius:10px;border:1px solid var(--border);margin-bottom:12px;overflow-x:auto;scrollbar-width:none;align-items:center}
.stats::-webkit-scrollbar{display:none}
.stat{font-size:11px;white-space:nowrap;flex-shrink:0}
.stat.total{color:var(--gold);font-weight:700}
.stat.benin{color:#86efac}
.stat.afrique{color:#fdba74}
.stat.intl{color:#93c5fd}
.stat.sync{margin-left:auto;color:var(--sub)}

/* ── SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;padding:0 16px 100px;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{width:3px}
.scroll-area::-webkit-scrollbar-track{background:transparent}
.scroll-area::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:10px}

/* ── CARD ── */
.card{background:linear-gradient(135deg,#0f1117,#1a1d26);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;transition:border .2s,transform .15s;-webkit-user-select:none;user-select:none}
.card:active{transform:scale(.98);background:#1a1d26}
.card-accent{position:absolute;bottom:0;left:0;right:0;height:2px}

.badges{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.badge-new{background:linear-gradient(90deg,#1d4ed8,#3b82f6);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}
.badge-funded{background:linear-gradient(90deg,#854d0e,#b45309);color:#fef3c7;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}

.card-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.03em}

.card-title{color:#f1f5f9;font-size:14px;font-weight:700;line-height:1.4;margin-bottom:3px}
.card-org{color:var(--gold);font-size:11px;font-weight:600;margin-bottom:6px}
.card-desc{color:#6b7280;font-size:11px;line-height:1.5;margin-bottom:10px}

.card-footer{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.deadline{font-size:11px;font-weight:700}
.deadline.ok{color:#4ade80}
.deadline.soon{color:#fbbf24}
.deadline.urgent{color:#f87171}
.deadline.expired{color:#6b7280}
.theme-tag{color:var(--muted);font-size:10px}

.apply-btn{display:block;text-align:center;font-weight:700;padding:8px;border-radius:8px;text-decoration:none;font-size:12px;letter-spacing:.03em;color:#fff;transition:opacity .2s}
.apply-btn:active{opacity:.8}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .icon{font-size:48px;margin-bottom:16px}
.empty p{font-size:14px;margin-bottom:16px}
.empty button{background:transparent;border:1px solid var(--border);color:#94a3b8;padding:8px 18px;border-radius:10px;cursor:pointer;font-size:13px}

/* ── LOADING BANNER ── */
.loading-banner{background:#1e2a3a;border:1px solid #1d4ed8;border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:#60a5fa;animation:pulse 1s infinite;flex-shrink:0}
.loading-banner span{color:#93c5fd;font-size:11px}

/* ── TOAST ── */
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px) + 16px);left:50%;transform:translateX(-50%);background:#14532d;border:1px solid #4ade80;color:#bbf7d0;padding:10px 18px;border-radius:12px;font-weight:600;font-size:13px;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s}
.toast.hide{opacity:0;pointer-events:none}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0f1117;border-top:1px solid var(--border);padding:8px 0 calc(env(safe-area-inset-bottom,0px) + 8px);display:flex;justify-content:space-around;z-index:50}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;padding:4px 20px;color:var(--muted);transition:color .2s}
.nav-btn.active{color:var(--gold)}
.nav-btn span:first-child{font-size:18px}
.nav-btn span:last-child{font-size:9px;font-weight:600;letter-spacing:.05em}

/* ── MODAL BACKDROP ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal-sheet{background:#12151e;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px)}
.modal-bg.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:10px;margin:0 auto 16px}
.modal-title{color:#f1f5f9;font-size:16px;font-weight:700;line-height:1.4;margin-bottom:4px}
.modal-org{color:var(--gold);font-weight:600;margin-bottom:12px;font-size:13px}
.modal-desc{color:#94a3b8;line-height:1.7;margin-bottom:16px;font-size:13px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.modal-item{background:#1a1d26;border-radius:10px;padding:10px 12px}
.modal-item-label{color:var(--muted);font-size:10px;margin-bottom:2px}
.modal-item-val{color:#e2e8f0;font-weight:600;font-size:13px}
.modal-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.modal-tag{background:#1a2030;color:#64748b;font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid #2a3040}
.modal-apply{display:block;text-align:center;background:linear-gradient(135deg,#b45309,#d97706);color:#fff;font-weight:700;padding:14px;border-radius:12px;text-decoration:none;font-size:15px;letter-spacing:.03em}
.modal-close-btn{background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0;float:right;line-height:1}

/* ── SUBMIT FORM ── */
.form-group{margin-bottom:14px}
.form-group label{color:#94a3b8;font-size:12px;display:block;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{background:#1a1d26;border:1px solid var(--border);border-radius:10px;color:#e2e8f0;padding:10px 12px;font-size:14px;width:100%;outline:none;font-family:inherit}
.form-group textarea{resize:vertical;min-height:80px}
.checkbox-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.checkbox-row input{width:18px;height:18px}
.checkbox-row label{color:#94a3b8;font-size:13px}
.btn-submit{width:100%;background:linear-gradient(135deg,#b45309,#d97706);color:#fff;font-weight:700;padding:14px;border-radius:12px;border:none;cursor:pointer;font-size:15px;margin-top:4px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="app">

  <!-- Toast -->
  <div id="toast" class="toast hide"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span class="logo-name">ENERGYHUB</span>
        <span class="logo-badge">IA</span>
        <span id="new-badge" class="new-badge" style="display:none"></span>
      </div>
      <div class="header-btns">
        <button class="btn-refresh" id="btn-refresh" onclick="autoFetch()">🔄</button>
        <button class="btn-add" onclick="openSubmit()">+ Ajouter</button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-box">
      <span style="color:var(--gold);display:flex;align-items:center">✦</span>
      <input id="search-input" type="text" placeholder='Bourse pour étudiant béninois en énergie…' onkeydown="if(event.key==='Enter')aiSearch()">
      <button class="btn-search" onclick="aiSearch()" id="btn-search">IA ✦</button>
    </div>

    <div id="ai-result" class="ai-result" style="display:none">
      <span>✦</span>
      <p id="ai-text"></p>
    </div>

    <div id="loading-banner" class="loading-banner" style="display:none">
      <div class="pulse-dot"></div>
      <span>L'IA cherche de nouvelles opportunités…</span>
    </div>

    <!-- Region Tabs -->
    <div class="region-tabs" id="region-tabs"></div>

    <!-- Filters -->
    <div class="filters" id="type-filters"></div>
  </div>

  <!-- Scroll Area -->
  <div class="scroll-area" id="scroll-area">
    <div class="stats" id="stats-bar"></div>
    <div id="cards-grid"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-all" onclick="setRegion('Tous')">
      <span>🏠</span><span>Accueil</span>
    </button>
    <button class="nav-btn" id="nav-benin" onclick="setRegion('Bénin')">
      <span>🇧🇯</span><span>Bénin</span>
    </button>
    <button class="nav-btn" id="nav-afrique" onclick="setRegion('Afrique')">
      <span>🌍</span><span>Afrique</span>
    </button>
    <button class="nav-btn" id="nav-intl" onclick="setRegion('International')">
      <span>🌐</span><span>Monde</span>
    </button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="detail-modal" onclick="closeModal('detail-modal')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Submit Modal -->
<div class="modal-bg" id="submit-modal" onclick="closeModal('submit-modal')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h3 style="color:#f1f5f9;font-size:16px;margin-bottom:16px">➕ Soumettre une opportunité</h3>
    <div class="form-group"><label>Titre</label><input type="text" id="f-title"></div>
    <div class="form-group"><label>Organisation</label><input type="text" id="f-org"></div>
    <div class="form-group"><label>Lien de candidature</label><input type="url" id="f-link" placeholder="https://..."></div>
    <div class="form-group"><label>Date limite</label><input type="date" id="f-deadline"></div>
    <div class="form-group"><label>Type</label>
      <select id="f-type">
        <option>Bourse</option><option>Fellowship</option><option>Appel à projets</option><option>Stage</option><option>Emploi</option>
      </select>
    </div>
    <div class="form-group"><label>Thème</label>
      <select id="f-theme">
        <option>Énergie renouvelable</option><option>Transition énergétique</option><option>Changement climatique</option>
      </select>
    </div>
    <div class="form-group"><label>Région</label>
      <select id="f-region">
        <option>Bénin</option><option>Afrique</option><option>International</option>
      </select>
    </div>
    <div class="form-group"><label>Description</label><textarea id="f-desc"></textarea></div>
    <div class="checkbox-row">
      <input type="checkbox" id="f-funded">
      <label for="f-funded">Entièrement financée</label>
    </div>
    <button class="btn-submit" onclick="submitOpp()">Soumettre</button>
  </div>
</div>

let state={region:"Tous",type:"Tous",theme:"Tous",funded:false,newCount:0};

// ── HELPERS ─────────────────────────────────────────────────────────────────
function daysUntil(d){return Math.ceil((new Date(d)-new Date())/86400000)}
function fmtDate(d){return new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"})}
function deadlineClass(d){const n=daysUntil(d);return n<0?"expired":n<=14?"urgent":n<=30?"soon":"ok"}
function deadlineText(d){const n=daysUntil(d);return n<0?"Expiré":(n<=14?"🔴 ":"⏰ ")+n+"j · "+fmtDate(d)}

function getFiltered(){
  return allOpps.filter(o=>{
    if(state.region!=="Tous"&&o.region!==state.region) return false;
    if(state.type!=="Tous"&&o.type!==state.type) return false;
    if(state.theme!=="Tous"&&o.theme!==state.theme) return false;
    if(state.funded&&!o.funded) return false;
    return true;
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  renderRegionTabs();
  renderTypeFilters();
  renderCards();
  renderStats();
}

function renderRegionTabs(){
  const regions=["Tous","Bénin","Afrique","International"];
  const flags={"Tous":"","Bénin":"🇧🇯 ","Afrique":"🌍 ","International":"🌐 "};
  document.getElementById("region-tabs").innerHTML=regions.map(r=>`
    <button class="tab ${state.region===r?"active":""}" onclick="setRegion('${r}')">
      ${flags[r]}${r}
      <span class="tab-count">${r==="Tous"?allOpps.length:allOpps.filter(o=>o.region===r).length}</span>
    </button>`).join("");
}

function renderTypeFilters(){
  const types=["Tous","Bourse","Fellowship","Appel à projets","Stage","Emploi"];
  const icons={"Bourse":"🎓 ","Fellowship":"🌍 ","Appel à projets":"💡 ","Stage":"🔬 ","Emploi":"💼 ","Tous":""};
  document.getElementById("type-filters").innerHTML=
    types.map(t=>`<button class="filter-btn ${state.type===t?"active":""}" onclick="setType('${t}')">${icons[t]}${t}</button>`).join("")+
    `<button class="filter-btn funded-btn ${state.funded?"active":""}" onclick="toggleFunded()">✦ Financé</button>`;
}

function renderStats(){
  const f=getFiltered();
  document.getElementById("stats-bar").innerHTML=`
    <span class="stat total">${f.length} résultat${f.length>1?"s":""}</span>
    <span class="stat benin">🇧🇯 ${f.filter(o=>o.region==="Bénin").length}</span>
    <span class="stat afrique">🌍 ${f.filter(o=>o.region==="Afrique").length}</span>
    <span class="stat intl">🌐 ${f.filter(o=>o.region==="International").length}</span>
    <span class="stat sync">✦ IA</span>`;
}

function renderCards(){
  const f=getFiltered();
  const grid=document.getElementById("cards-grid");
  if(!f.length){
    grid.innerHTML=`<div class="empty"><div class="icon">🔍</div><p>Aucune opportunité trouvée.</p><button onclick="resetFilters()">Réinitialiser</button></div>`;
    return;
  }
  grid.innerHTML=f.map(o=>{
    const c=TYPE_COLORS[o.type]||TYPE_COLORS["Stage"];
    const rc=REGION_COLORS[o.region]||REGION_COLORS["International"];
    return `<div class="card" onclick="openDetail(${o.id})">
      <div class="badges">
        ${o.isNew?'<span class="badge-new">✦ NOUVEAU</span>':""}
        ${o.funded?'<span class="badge-funded">✦ FINANCÉ</span>':""}
      </div>
      <div style="margin-top:${o.isNew||o.funded?"28px":"0"}">
        <div class="card-pills">
          <span class="pill" style="background:${c.bg};border:1px solid ${c.border};color:${c.text}">${TYPE_ICONS[o.type]} ${o.type}</span>
          <span class="pill" style="background:${rc.bg};border:1px solid ${rc.border};color:${rc.text}">${REGION_FLAGS[o.region]} ${o.region}</span>
        </div>
        <div class="card-title">${o.title}</div>
        <div class="card-org">${o.org}</div>
        <div class="card-desc">${o.description.substring(0,100)}…</div>
        <div class="card-footer">
          <span class="deadline ${deadlineClass(o.deadline)}">${deadlineText(o.deadline)}</span>
          <span class="theme-tag">📌 ${o.theme.split(" ")[0]}</span>
        </div>
        <a href="${o.link}" target="_blank" rel="noreferrer" class="apply-btn" style="background:linear-gradient(135deg,${c.border},${c.text}cc)" onclick="event.stopPropagation()">
          Postuler → ${o.link.replace(/https?:\/\//,"").split("/")[0]}
        </a>
      </div>
      <div class="card-accent" style="background:linear-gradient(90deg,transparent,${c.text}44,transparent)"></div>
    </div>`;
  }).join("");
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function setRegion(r){
  state.region=r;
  ["all","benin","afrique","intl"].forEach(id=>document.getElementById("nav-"+id)?.classList.remove("active"));
  const map={"Tous":"all","Bénin":"benin","Afrique":"afrique","International":"intl"};
  document.getElementById("nav-"+(map[r]||"all"))?.classList.add("active");
  render();
}
function setType(t){state.type=t;render();}
function toggleFunded(){state.funded=!state.funded;render();}
function resetFilters(){state={...state,region:"Tous",type:"Tous",theme:"Tous",funded:false};render();}

// ── AI SEARCH ────────────────────────────────────────────────────────────────
async function aiSearch(){
  const q=document.getElementById("search-input").value.trim();
  if(!q) return;
  const btn=document.getElementById("btn-search");
  btn.textContent="⏳"; btn.disabled=true;
  document.getElementById("ai-result").style.display="none";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:`Assistant opportunités énergie & climat. Données : ${JSON.stringify(allOpps)}. Réponds UNIQUEMENT JSON sans backtick : {"message":"...","ids":[1,2]}`,
        messages:[{role:"user",content:q}]})
    });
    const data=await res.json();
    const parsed=JSON.parse(data.content?.[0]?.text||"{}");
    document.getElementById("ai-text").textContent=parsed.message||"";
    document.getElementById("ai-result").style.display="flex";
    if(parsed.ids?.length){
      const ids=new Set(parsed.ids);
      document.getElementById("cards-grid").innerHTML=allOpps.filter(o=>ids.has(o.id)).map(renderCardHTML).join("");
      renderStats();
    }
  }catch{showToast("Erreur de recherche IA");}
  btn.textContent="IA ✦"; btn.disabled=false;
}

function renderCardHTML(o){
  const c=TYPE_COLORS[o.type]||TYPE_COLORS["Stage"];
  const rc=REGION_COLORS[o.region]||REGION_COLORS["International"];
  return `<div class="card" onclick="openDetail(${o.id})">
    <div class="badges">${o.isNew?'<span class="badge-new">✦ NOUVEAU</span>':""}${o.funded?'<span class="badge-funded">✦ FINANCÉ</span>':""}</div>
    <div style="margin-top:${o.isNew||o.funded?"28px":"0"}">
      <div class="card-pills">
        <span class="pill" style="background:${c.bg};border:1px solid ${c.border};color:${c.text}">${TYPE_ICONS[o.type]} ${o.type}</span>
        <span class="pill" style="background:${rc.bg};border:1px solid ${rc.border};color:${rc.text}">${REGION_FLAGS[o.region]} ${o.region}</span>
      </div>
      <div class="card-title">${o.title}</div>
      <div class="card-org">${o.org}</div>
      <div class="card-desc">${o.description.substring(0,100)}…</div>
      <div class="card-footer">
        <span class="deadline ${deadlineClass(o.deadline)}">${deadlineText(o.deadline)}</span>
        <span class="theme-tag">📌 ${o.theme.split(" ")[0]}</span>
      </div>
      <a href="${o.link}" target="_blank" rel="noreferrer" class="apply-btn" style="background:linear-gradient(135deg,${c.border},${c.text}cc)" onclick="event.stopPropagation()">Postuler → ${o.link.replace(/https?:\/\//,"").split("/")[0]}</a>
    </div>
    <div class="card-accent" style="background:linear-gradient(90deg,transparent,${c.text}44,transparent)"></div>
  </div>`;
}

// ── AUTO FETCH ───────────────────────────────────────────────────────────────
async function autoFetch(){
  const btn=document.getElementById("btn-refresh");
  btn.textContent="⏳"; btn.disabled=true;
  document.getElementById("loading-banner").style.display="flex";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        system:`Cherche des opportunités récentes en énergie renouvelable, transition énergétique et changement climatique pour le Bénin, l'Afrique et l'international ouvertes en 2026.
Retourne UNIQUEMENT un JSON valide sans backtick :
{"opportunities":[{"title":"...","org":"...","type":"Bourse|Fellowship|Appel à projets|Stage|Emploi","theme":"Énergie renouvelable|Transition énergétique|Changement climatique","region":"Bénin|Afrique|International","deadline":"YYYY-MM-DD","description":"...","link":"https://...","funded":true,"tags":["..."]}]}
Retourne 3 opportunités réelles avec vrais liens officiels. Rien d'autre que le JSON.`,
        messages:[{role:"user",content:"Recherche les opportunités ouvertes mai 2026 énergie renouvelable climat Bénin Afrique international."}]})
    });
    const data=await res.json();
    const tb=data.content?.find(b=>b.type==="text");
    if(tb){
      const raw=tb.text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(raw);
      const fresh=(parsed.opportunities||[]).map((o,i)=>({...o,id:Date.now()+i,tags:o.tags||[],isNew:true}));
      const existing=new Set(allOpps.map(o=>o.title.toLowerCase()));
      const added=fresh.filter(o=>!existing.has(o.title.toLowerCase()));
      if(added.length){
        allOpps=[...added,...allOpps];
        state.newCount+=added.length;
        const nb=document.getElementById("new-badge");
        nb.textContent="+"+state.newCount+" NOUVEAU";
        nb.style.display="inline";
        showToast(`✦ ${added.length} nouvelle${added.length>1?"s":""} opportunité${added.length>1?"s":""} ajoutée${added.length>1?"s":""} !`);
        render();
      } else showToast("✓ Déjà à jour !");
    }
  }catch{showToast("Actualisation impossible hors ligne");}
  document.getElementById("loading-banner").style.display="none";
  btn.textContent="🔄"; btn.disabled=false;
}

// ── DETAIL MODAL ─────────────────────────────────────────────────────────────
function openDetail(id){
  const o=allOpps.find(x=>x.id===id);
  if(!o) return;
  const c=TYPE_COLORS[o.type]||TYPE_COLORS["Stage"];
  const rc=REGION_COLORS[o.region]||REGION_COLORS["International"];
  document.getElementById("modal-content").innerHTML=`
    <button class="modal-close-btn" onclick="closeModal('detail-modal')">×</button>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <span class="pill" style="background:${c.bg};border:1px solid ${c.border};color:${c.text}">${TYPE_ICONS[o.type]} ${o.type}</span>
      <span class="pill" style="background:${rc.bg};border:1px solid ${rc.border};color:${rc.text}">${REGION_FLAGS[o.region]} ${o.region}</span>
      ${o.funded?'<span class="pill" style="background:linear-gradient(90deg,#854d0e,#b45309);color:#fef3c7">✦ FINANCÉ</span>':""}
    </div>
    <div class="modal-title">${o.title}</div>
    <div class="modal-org">${o.org}</div>
    <div class="modal-desc">${o.description}</div>
    <div class="modal-grid">
      <div class="modal-item"><div class="modal-item-label">📅 Deadline</div><div class="modal-item-val">${fmtDate(o.deadline)}</div></div>
      <div class="modal-item"><div class="modal-item-label">🌍 Région</div><div class="modal-item-val">${o.region}</div></div>
      <div class="modal-item"><div class="modal-item-label">💰 Financé</div><div class="modal-item-val">${o.funded?"Oui ✓":"Non"}</div></div>
      <div class="modal-item"><div class="modal-item-label">📌 Thème</div><div class="modal-item-val" style="font-size:11px">${o.theme}</div></div>
    </div>
    ${o.tags?.length?`<div class="modal-tags">${o.tags.map(t=>`<span class="modal-tag">#${t}</span>`).join("")}</div>`:""}
    <a href="${o.link}" target="_blank" rel="noreferrer" class="modal-apply">Postuler maintenant →</a>`;
  document.getElementById("detail-modal").classList.add("open");
  document.body.style.overflow="hidden";
}

function openSubmit(){
  document.getElementById("submit-modal").classList.add("open");
  document.body.style.overflow="hidden";
}

function closeModal(id){
  document.getElementById(id).classList.remove("open");
  document.body.style.overflow="";
}

function submitOpp(){
  const title=document.getElementById("f-title").value.trim();
  if(!title){showToast("⚠️ Le titre est requis");return;}
  const opp={
    id:Date.now(),title,
    org:document.getElementById("f-org").value||"—",
    type:document.getElementById("f-type").value,
    theme:document.getElementById("f-theme").value,
    region:document.getElementById("f-region").value,
    deadline:document.getElementById("f-deadline").value||"2026-12-31",
    description:document.getElementById("f-desc").value||"",
    link:document.getElementById("f-link").value||"#",
    funded:document.getElementById("f-funded").checked,
    tags:[],isNew:false
  };
  allOpps=[opp,...allOpps];
  closeModal("submit-modal");
  render();
  showToast("✅ Opportunité ajoutée !");
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.remove("hide");
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>t.classList.add("hide"),3500);
}

// ── SERVICE WORKER ───────────────────────────────────────────────────────────
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}

// ── INSTALL PROMPT ───────────────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferredPrompt=e;
  setTimeout(()=>{
    showToast("📲 Installer l'app ? Appuie sur ⋮ → Ajouter à l'écran d'accueil");
  },3000);
});

// ── INIT ─────────────────────────────────────────────────────────────────────
render();
setTimeout(autoFetch,1500);
</script>
